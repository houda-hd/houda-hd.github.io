<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>长沙站移动版全景图</title>
    <style>
        :root {
            --wall-color: #34495e;
            --floor-color: #2c3e50;
            --platform-color: #2980b9;
            --room-1-4: #27ae60;
            --highlight: #e74c3c;
        }

        body {
            margin: 0; background: #1a1a1a; color: white;
            font-family: sans-serif; overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        .header { padding: 15px; text-align: center; background: #000; z-index: 10; }
        .header h1 { margin: 0; font-size: 1.2rem; color: #f1c40f; }

        /* 3D 容器 */
        .viewport {
            flex: 1; perspective: 1000px;
            display: flex; align-items: center; justify-content: center;
        }

        .world {
            width: 300px; height: 500px; /* 针对手机屏幕比例 */
            position: relative; transform-style: preserve-3d;
            transform: rotateX(65deg) rotateZ(-25deg);
            transition: transform 0.5s ease;
        }

        /* 统一的基础块 */
        .unit {
            position: absolute; transform-style: preserve-3d;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; text-align: center; font-weight: bold;
        }

        /* 侧边墙模拟 */
        .unit::after {
            content: ''; position: absolute; top: 100%; left: 0; width: 100%;
            height: 15px; background: rgba(0,0,0,0.4);
            transform-origin: top; transform: rotateX(-90deg);
        }

        /* --- 站场区域 (后端) --- */
        .platform { width: 280px; height: 30px; background: var(--platform-color); left: 10px; }
        .p1 { top: 0px; transform: translateZ(5px); }
        .p2 { top: 40px; transform: translateZ(5px); }
        .p3 { top: 80px; transform: translateZ(5px); }
        .p4 { top: 120px; transform: translateZ(5px); }

        /* --- 候车室区域 (二楼 - 高位) --- */
        .waiting-area { width: 280px; height: 220px; left: 10px; top: 170px; background: #34495e; transform: translateZ(40px); }
        
        /* 内部房间分块 */
        .room { position: absolute; background: var(--room-1-4); border: 1px solid #fff; }
        .r1 { width: 110px; height: 90px; left: 10px; top: 10px; } /* 第一候车室 */
        .r2 { width: 110px; height: 90px; left: 10px; top: 120px; } /* 第二候车室 */
        .r3 { width: 110px; height: 90px; right: 10px; top: 10px; background: #2ecc71; } /* 第三候车室 */
        .r4 { width: 110px; height: 90px; right: 10px; top: 120px; background: #2ecc71; } /* 第四候车室 */
        
        /* 中央走廊与检票口 */
        .gate-line { width: 40px; height: 220px; left: 120px; top: 0; background: #95a5a6; display: flex; flex-direction: column; justify-content: space-around; }
        .gate-node { height: 20px; background: var(--highlight); color: white; font-size: 8px; }

        /* --- 进站大厅 (一楼 - 低位) --- */
        .lobby { width: 280px; height: 80px; left: 10px; top: 400px; background: #7f8c8d; transform: translateZ(10px); }
        .ticket-office { width: 60px; height: 60px; left: 10px; top: 10px; background: #e67e22; position: absolute; }
        .exit { width: 60px; height: 60px; right: 10px; top: 10px; background: #d35400; position: absolute; }

        /* 标志性钟楼 (手机端垂直拉高) */
        .tower {
            width: 40px; height: 40px; background: #ecf0f1;
            left: 130px; top: 420px; transform: translateZ(100px);
        }
        .torch {
            width: 20px; height: 20px; background: red; border-radius: 50% 50% 0 50%;
            position: absolute; top: 10px; left: 10px; transform: translateZ(50px) rotateZ(45deg);
            box-shadow: 0 0 15px red;
        }

        .controls {
            padding: 20px; background: #000; display: flex; justify-content: space-around;
        }
        button { padding: 10px; background: #333; color: white; border: 1px solid #555; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>长沙火车站全景示意图 (移动端)</h1>
    </div>

    <div class="viewport" id="viewport">
        <div class="world" id="world">
            <div class="unit platform p1">1号站台</div>
            <div class="unit platform p2">2号站台</div>
            <div class="unit platform p3">3号站台</div>
            <div class="unit platform p4">4号站台</div>

            <div class="unit waiting-area">
                <div class="room r1">第一候车室</div>
                <div class="room r2">第二候车室</div>
                <div class="room r3">第三候车室</div>
                <div class="room r4">第四候车室</div>
                <div class="gate-line">
                    <div class="gate-node">检票1</div>
                    <div class="gate-node">检票2</div>
                    <div class="gate-node">检票3</div>
                    <div class="gate-node">检票4</div>
                </div>
            </div>

            <div class="unit lobby">
                <div class="ticket-office">售票处</div>
                <div class="unit exit">出站口</div>
                <span>中央大厅 (进站安检)</span>
            </div>

            <div class="unit tower">
                <div class="torch"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="rotate(0)">俯视</button>
        <button onclick="rotate(1)">侧视</button>
        <button onclick="rotate(2)">进站视角</button>
    </div>

    <script>
        const world = document.getElementById('world');
        function rotate(type) {
            if(type === 0) world.style.transform = 'rotateX(80deg) rotateZ(0deg)';
            if(type === 1) world.style.transform = 'rotateX(65deg) rotateZ(-45deg)';
            if(type === 2) world.style.transform = 'rotateX(45deg) rotateZ(-10deg) scale(0.8)';
        }

        // 简单的移动端触摸旋转逻辑
        let startX;
        document.addEventListener('touchstart', e => startX = e.touches[0].pageX);
        document.addEventListener('touchmove', e => {
            let diff = e.touches[0].pageX - startX;
            world.style.transform = `rotateX(65deg) rotateZ(${-25 + diff/5}deg)`;
        });
    </script>
</body>
</html>
