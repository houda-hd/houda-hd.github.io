<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>长沙站 - 3D空间分布图</title>
    <style>
        :root {
            --bg: #0f172a;
            --floor-1: rgba(51, 65, 85, 0.9);
            --floor-2: rgba(30, 41, 59, 0.95);
            --waiting-room: #0ea5e9;
            --vip-room: #f43f5e;
            --platform: #64748b;
            --text: #f8fafc;
        }

        body {
            margin: 0; background-color: var(--bg); color: var(--text);
            font-family: -apple-system, sans-serif; overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* 顶部信息 */
        .ui-overlay {
            padding: 20px; text-align: center; pointer-events: none; z-index: 100;
        }
        .ui-overlay h1 { margin: 0; font-size: 1.4rem; letter-spacing: 2px; }
        .ui-overlay p { font-size: 0.8rem; opacity: 0.7; }

        /* 3D 舞台 */
        .stage {
            flex: 1; perspective: 1200px;
            display: flex; align-items: center; justify-content: center;
        }

        .container {
            width: 320px; height: 500px;
            position: relative; transform-style: preserve-3d;
            transform: rotateX(60deg) rotateZ(-30deg);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 层级共用样式 */
        .level {
            position: absolute; width: 100%; transform-style: preserve-3d;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .label {
            position: absolute; transform: rotateZ(30deg) rotateX(-60deg);
            font-size: 10px; background: rgba(0,0,0,0.5); padding: 2px 5px;
            white-space: nowrap; pointer-events: none;
        }

        /* ================= 3层：站台层 (最底层) ================= */
        .platform-layer {
            height: 180px; top: 0; background: var(--platform);
            transform: translateZ(0px);
        }
        .rail {
            height: 2px; width: 100%; background: #334155;
            position: absolute;
        }

        /* ================= 1层：进站大厅 (地面层) ================= */
        .floor-1-layer {
            height: 120px; bottom: 0; background: var(--floor-1);
            transform: translateZ(50px);
        }
        .hall-1 { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

        /* ================= 2层：核心候车室 (悬浮层) ================= */
        .floor-2-layer {
            height: 240px; bottom: 130px; 
            background: var(--floor-2);
            transform: translateZ(120px); /* 向上拉开距离 */
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        /* 候车室布局 */
        .room {
            position: absolute; background: var(--waiting-room);
            border: 1px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; padding: 5px; box-sizing: border-box;
        }

        .wr-1 { width: 130px; height: 100px; left: 10px; top: 10px; }
        .wr-2 { width: 130px; height: 100px; left: 10px; bottom: 10px; }
        .wr-3 { width: 130px; height: 100px; right: 10px; top: 10px; background: #0284c7; }
        .wr-4 { width: 130px; height: 100px; right: 10px; bottom: 10px; background: #0284c7; }
        
        .central-path {
            position: absolute; width: 40px; height: 100%; left: 140px;
            background: rgba(255,255,255,0.1);
        }

        .gate {
            width: 100%; height: 15px; background: var(--vip-room);
            position: absolute; top: 0; display: flex; align-items: center; justify-content: center;
            font-size: 9px;
        }

        /* 钟楼与火炬 */
        .tower-structure {
            position: absolute; width: 40px; height: 40px;
            background: #cbd5e1; bottom: 20px; left: 140px;
            transform: translateZ(60px); transform-style: preserve-3d;
        }
        .tower-structure::after {
            content: '长沙站'; position: absolute; width: 40px; height: 40px;
            background: #94a3b8; transform: rotateY(90deg) translateZ(-20px);
            font-size: 10px; color: #1e293b; writing-mode: vertical-lr; padding-left: 15px;
        }
        .torch-top {
            position: absolute; width: 15px; height: 25px; background: #ef4444;
            bottom: 0; left: 12.5px; transform: translateZ(40px);
            border-radius: 50% 50% 0 50%; box-shadow: 0 0 15px #ef4444;
        }

        /* 交互说明 */
        .legend {
            padding: 15px; background: rgba(0,0,0,0.8);
            font-size: 0.75rem; line-height: 1.6;
        }
        .color-tag { display: inline-block; width: 10px; height: 10px; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <h1>长沙站 3D 空间结构</h1>
        <p>双指缩放或滑动旋转观察</p>
    </div>

    <div class="stage">
        <div class="container" id="mainObj">
            
            <div class="level platform-layer">
                <div class="rail" style="top: 20%"></div>
                <div class="rail" style="top: 50%"></div>
                <div class="rail" style="top: 80%"></div>
                <div class="label" style="top: 50%; left: 10px;">1-4号站台区域</div>
            </div>

            <div class="level floor-1-layer">
                <div class="hall-1">一楼大厅 (安检/售票/出站)</div>
                <div class="label" style="top:-20px;">F1 地面层</div>
            </div>

            <div class="level floor-2-layer">
                <div class="central-path">
                    <div class="gate">检票口</div>
                </div>
                
                <div class="room wr-1">第一候车室<br>(1号检票)</div>
                <div class="room wr-2">第二候车室<br>(2号检票)</div>
                <div class="room wr-3">第三候车室<br>(3号检票)</div>
                <div class="room wr-4">第四候车室<br>(4号检票)</div>

                <div class="tower-structure">
                    <div class="torch-top"></div>
                </div>
                
                <div class="label" style="top:-20px;">F2 核心候车层</div>
            </div>

        </div>
    </div>

    <div class="legend">
        <div><span class="color-tag" style="background:var(--waiting-room)"></span>蓝色：主要候车区域 (分居大厅两侧)</div>
        <div><span class="color-tag" style="background:var(--vip-room)"></span>红色：检票口/火炬塔 (建筑灵魂)</div>
        <div><span class="color-tag" style="background:var(--platform)"></span>灰色：站台层 (列车停靠区)</div>
    </div>

    <script>
        const container = document.getElementById('mainObj');
        let isMoving = false;
        let startX, startY;
        let rotateY = -30;
        let rotateX = 60;

        // 移动端触摸旋转逻辑
        document.addEventListener('touchstart', e => {
            startX = e.touches[0].pageX;
            startY = e.touches[0].pageY;
        });

        document.addEventListener('touchmove', e => {
            const x = e.touches[0].pageX;
            const y = e.touches[0].pageY;
            const diffX = x - startX;
            const diffY = y - startY;
            
            // 限制旋转范围
            const newRY = rotateY + diffX * 0.5;
            const newRX = Math.max(30, Math.min(80, rotateX - diffY * 0.5));
            
            container.style.transform = `rotateX(${newRX}deg) rotateZ(${newRY}deg)`;
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
