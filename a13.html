<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>侯大纪念日 | HOUDA+</title>
    <style>
        :root {
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", sans-serif;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-blue: #0071e3;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: var(--font-main);
            background-color: #f5f5f7;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* 1. 噪声纹理层 - 增加电影感 */
        body::after {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none; z-index: 5;
        }

        /* 2. 背景灵动光斑 */
        .blobs {
            position: absolute; width: 100%; height: 100%; z-index: 1; filter: blur(80px);
        }
        .blob {
            position: absolute; border-radius: 50%; opacity: 0.5;
            animation: move 25s infinite alternate ease-in-out;
        }
        .b1 { width: 500px; height: 500px; background: #d4e8fc; top: -10%; left: -10%; }
        .b2 { width: 400px; height: 400px; background: #fbe0eb; bottom: -5%; right: -5%; animation-delay: -7s; }
        .b3 { width: 300px; height: 300px; background: #e8e2fb; top: 30%; left: 40%; animation-delay: -12s; }
        @keyframes move {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(50px, 80px) scale(1.15); }
        }

        /* 3. 卡片容器 */
        .container {
            position: relative; z-index: 10;
            width: 90%; max-width: 440px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 0.5px solid rgba(255, 255, 255, 0.7);
            border-radius: 38px;
            padding: 50px 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
            transition: transform 0.1s ease-out; /* 为鼠标跟随准备 */
            text-align: center;
        }

        .subtitle {
            font-size: 10px; font-weight: 700; color: var(--text-secondary);
            letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 12px;
        }

        h1 {
            font-size: 32px; font-weight: 700; color: var(--text-primary);
            margin: 0 0 40px 0; letter-spacing: -0.03em;
        }

        /* 4. 倒计时排版优化 */
        .countdown {
            display: flex; justify-content: space-around; align-items: baseline;
            margin-bottom: 50px;
        }
        .unit { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .unit .num {
            font-size: clamp(38px, 10vw, 52px);
            font-weight: 500; color: var(--text-primary);
            letter-spacing: -0.05em; line-height: 1;
        }
        .unit .label {
            font-size: 11px; font-weight: 600; color: var(--text-secondary);
            margin-top: 10px; opacity: 0.8;
        }
        .sep {
            font-size: 24px; color: rgba(0,0,0,0.1); font-weight: 300;
            padding-bottom: 20px;
        }

        /* 5. 按钮 */
        .btn {
            display: inline-block;
            background: var(--text-primary); color: white;
            padding: 14px 32px; border-radius: 980px;
            font-size: 15px; font-weight: 600; text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn:hover { transform: scale(1.05); background: #333; }
        .btn:active { transform: scale(0.98); }

    </style>
</head>
<body>

    <div class="blobs">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <div class="container" id="card">
        <div class="subtitle">Anniversary Countdown</div>
        <h1>侯大纪念日</h1>
        
        <div class="countdown">
            <div class="unit">
                <div class="num" id="d">00</div>
                <div class="label">DAYS</div>
            </div>
            <div class="sep">/</div>
            <div class="unit">
                <div class="num" id="h">00</div>
                <div class="label">HOURS</div>
            </div>
            <div class="sep">/</div>
            <div class="unit">
                <div class="num" id="m">00</div>
                <div class="label">MINS</div>
            </div>
            <div class="sep">/</div>
            <div class="unit">
                <div class="num" id="s">00</div>
                <div class="label">SECS</div>
            </div>
        </div>

        <a href="index.html" class="btn">HOUDA+ 官网</a>
    </div>

    <script>
        // 倒计时逻辑
        function update() {
            const now = new Date();
            let target = new Date(now.getFullYear(), 3, 22);
            if (now > target) target.setFullYear(now.getFullYear() + 1);
            const diff = target - now;
            
            const parts = {
                d: Math.floor(diff / 864e5),
                h: Math.floor((diff % 864e5) / 36e5),
                m: Math.floor((diff % 36e5) / 6e4),
                s: Math.floor((diff % 6e4) / 1000)
            };

            for (let k in parts) {
                document.getElementById(k).innerText = String(parts[k]).padStart(2, '0');
            }
        }
        setInterval(update, 1000);
        update();

        // 微交互：卡片视差跟随
        const card = document.getElementById('card');
        if (window.innerWidth > 768) {
            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth / 2 - e.pageX) / 45;
                const y = (window.innerHeight / 2 - e.pageY) / 45;
                card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
            });
        }
    </script>
</body>
</html>
