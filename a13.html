<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>侯大纪念日 | HOUDA+</title>
    <style>
        :root {
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", sans-serif;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --bg-base: #f5f5f7;
            --glass-bg: rgba(255, 255, 255, 0.65);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: var(--font-main);
            background-color: var(--bg-base);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        /* 灵动背景 */
        .blobs-container { position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .blob { position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.5; animation: move 20s infinite alternate ease-in-out; }
        .blob-1 { width: 300px; height: 300px; background: #d4e8fc; top: -50px; left: -50px; }
        .blob-2 { width: 280px; height: 280px; background: #fbe0eb; bottom: 10%; right: -30px; animation-delay: -5s; }
        .blob-3 { width: 220px; height: 220px; background: #e8e2fb; bottom: -20px; left: 20%; animation-delay: -10s; }
        @keyframes move { from { transform: translate(0, 0) scale(1); } to { transform: translate(30px, 50px) scale(1.1); } }

        /* 玻璃面板 */
        .glass-panel {
            position: relative; z-index: 2;
            width: 90%; max-width: 480px;
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 36px;
            padding: 56px 24px 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.08);
            text-align: center;
        }

        .subtitle {
            font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
            color: var(--text-secondary); text-transform: uppercase; margin-bottom: 12px;
        }

        h1 { font-size: 32px; font-weight: 700; color: var(--text-primary); margin: 0 0 10px 0; letter-spacing: -0.02em; }
        
        /* 动态寄语 */
        #motto {
            font-size: 14px; color: var(--text-secondary);
            margin-bottom: 40px; height: 1.5em; opacity: 0.8;
            font-weight: 400;
        }

        /* 倒计时 */
        .countdown { display: flex; justify-content: center; align-items: baseline; gap: 4px; margin-bottom: 48px; }
        .time-unit { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .time-unit span { font-size: clamp(34px, 11vw, 52px); font-weight: 500; color: var(--text-primary); font-variant-numeric: tabular-nums; line-height: 1; }
        .time-unit p { margin: 10px 0 0; font-size: 11px; font-weight: 600; color: var(--text-secondary); opacity: 0.7; }
        .divider { font-size: clamp(24px, 8vw, 36px); font-weight: 200; color: rgba(0,0,0,0.1); line-height: 1; }

        /* 按钮组 */
        .actions { display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .btn-main {
            display: inline-flex; align-items: center;
            padding: 14px 36px; background-color: var(--text-primary);
            color: white; font-size: 16px; font-weight: 600;
            text-decoration: none; border-radius: 980px;
            transition: all 0.2s ease;
        }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }

        /* 底部微型导航 */
        .footer-nav {
            margin-top: 40px; padding-top: 24px;
            border-top: 0.5px solid rgba(0,0,0,0.05);
            display: flex; justify-content: center; gap: 24px;
        }
        .footer-nav a {
            font-size: 12px; color: var(--text-secondary);
            text-decoration: none; transition: color 0.2s;
        }
        .footer-nav a:hover { color: var(--text-primary); }

        @media (max-width: 360px) { .glass-panel { padding: 40px 16px; } }
    </style>
</head>
<body>

    <div class="blobs-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="glass-panel">
        <div class="subtitle">Next Anniversary</div>
        <h1>侯大纪念日</h1>
        <div id="motto">每一份热爱，都值得被精准计时</div>
        
        <div class="countdown">
            <div class="time-unit"><span id="days">00</span><p>DAYS</p></div>
            <div class="divider">/</div>
            <div class="time-unit"><span id="hours">00</span><p>HOURS</p></div>
            <div class="divider">/</div>
            <div class="time-unit"><span id="minutes">00</span><p>MINS</p></div>
            <div class="divider">/</div>
            <div class="time-unit"><span id="seconds">00</span><p>SECS</p></div>
        </div>

        <div class="actions">
            <a href="index.html" class="btn-main">HOUDA+ 官网</a>
        </div>

        <div class="footer-nav">
            <a href="#">关于我们</a>
            <a href="#">加入日历</a>
            <a href="#">分享愿望</a>
        </div>
    </div>

    <script>
        const mottos = [
            "每一份热爱，都值得被精准计时",
            "与其向往，不如出发",
            "探索未知的序章",
            "Stay hungry, Stay foolish",
            "HOUDA+ 让未来如约而至"
        ];
        
        let mottoIdx = 0;
        setInterval(() => {
            mottoIdx = (mottoIdx + 1) % mottos.length;
            const mottoEl = document.getElementById('motto');
            mottoEl.style.opacity = 0;
            setTimeout(() => {
                mottoEl.innerText = mottos[mottoIdx];
                mottoEl.style.opacity = 0.8;
            }, 500);
        }, 5000);

        function update() {
            const now = new Date();
            let target = new Date(now.getFullYear(), 3, 22);
            if (now > target) target.setFullYear(now.getFullYear() + 1);
            const diff = target - now;
            const d = Math.floor(diff / 864e5);
            const h = Math.floor((diff % 864e5) / 36e5);
            const m = Math.floor((diff % 36e5) / 6e4);
            const s = Math.floor((diff % 6e4) / 1000);
            document.getElementById('days').innerText = String(d).padStart(2, '0');
            document.getElementById('hours').innerText = String(h).padStart(2, '0');
            document.getElementById('minutes').innerText = String(m).padStart(2, '0');
            document.getElementById('seconds').innerText = String(s).padStart(2, '0');
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
