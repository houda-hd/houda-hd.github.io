<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>侯大纪念日 | HOUDA+</title>
    <style>
        /* =========================================
           1. 核心规范与字体
           ========================================= */
        :root {
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", sans-serif;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --bg-base: #f5f5f7;
            --glass-bg: rgba(255, 255, 255, 0.6);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: var(--font-main);
            background-color: var(--bg-base);
            overflow: hidden; /* 防止背景光斑滚动 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* =========================================
           2. 灵动背景 (优化性能)
           ========================================= */
        .blobs-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            animation: move 20s infinite alternate ease-in-out;
        }

        .blob-1 { width: 300px; height: 300px; background: #d4e8fc; top: -50px; left: -50px; }
        .blob-2 { width: 250px; height: 250px; background: #fbe0eb; bottom: 10%; right: -20px; animation-delay: -5s; }
        .blob-3 { width: 200px; height: 200px; background: #e8e2fb; bottom: -20px; left: 20%; animation-delay: -10s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(20px, 40px) scale(1.1); }
        }

        /* =========================================
           3. 液态玻璃面板 (适配 iPhone 溢出)
           ========================================= */
        .glass-panel {
            position: relative;
            z-index: 2;
            width: 92%; /* 移动端默认宽度 */
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 0.5px solid rgba(255, 255, 255, 0.7);
            border-radius: 32px;
            padding: 40px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            text-align: center;
        }

        .subtitle {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.15em;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 32px 0;
            letter-spacing: -0.01em;
        }

        /* =========================================
           4. 响应式倒计时 (核心适配逻辑)
           ========================================= */
        .countdown {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 4px; /* 极窄间距防止溢出 */
            margin-bottom: 40px;
        }

        .time-unit {
            flex: 1;
            min-width: 0; /* 允许 flex 项目收缩 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 使用 clamp 动态调整字体大小，避免 iPhone SE 等小屏溢出 */
        .time-unit span {
            font-size: clamp(32px, 10vw, 56px);
            font-weight: 500;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .time-unit p {
            margin: 8px 0 0 0;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .divider {
            font-size: clamp(24px, 8vw, 40px);
            font-weight: 300;
            color: rgba(0,0,0,0.15);
            line-height: 1.2;
        }

        /* =========================================
           5. 苹果式按钮
           ========================================= */
        .btn-houda {
            display: inline-flex;
            align-items: center;
            padding: 12px 28px;
            background-color: var(--text-primary);
            color: white;
            font-size: 15px;
            font-weight: 500;
            text-decoration: none;
            border-radius: 980px;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .btn-houda:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        .btn-houda svg {
            margin-left: 6px;
            width: 14px;
            height: 14px;
        }

        /* 针对超窄屏幕的最后防线 */
        @media (max-width: 360px) {
            .glass-panel { padding: 32px 12px; }
            h1 { font-size: 24px; }
            .countdown { gap: 2px; }
        }
    </style>
</head>
<body>

    <div class="blobs-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="glass-panel">
        <div class="subtitle">ANNIVERSARY</div>
        <h1>侯大纪念日</h1>
        
        <div class="countdown">
            <div class="time-unit">
                <span id="days">00</span>
                <p>天</p>
            </div>
            <div class="divider">:</div>
            <div class="time-unit">
                <span id="hours">00</span>
                <p>时</p>
            </div>
            <div class="divider">:</div>
            <div class="time-unit">
                <span id="minutes">00</span>
                <p>分</p>
            </div>
            <div class="divider">:</div>
            <div class="time-unit">
                <span id="seconds">00</span>
                <p>秒</p>
            </div>
        </div>

        <a href="index.html" class="btn-houda">
            HOUDA+ 官网
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </a>
    </div>

    <script>
        function update() {
            const now = new Date();
            let target = new Date(now.getFullYear(), 3, 22); // 4月22日
            if (now > target) target.setFullYear(now.getFullYear() + 1);

            const diff = target - now;
            const d = Math.floor(diff / 864e5);
            const h = Math.floor((diff % 864e5) / 36e5);
            const m = Math.floor((diff % 36e5) / 6e4);
            const s = Math.floor((diff % 6e4) / 1000);

            document.getElementById('days').innerText = String(d).padStart(2, '0');
            document.getElementById('hours').innerText = String(h).padStart(2, '0');
            document.getElementById('minutes').innerText = String(m).padStart(2, '0');
            document.getElementById('seconds').innerText = String(s).padStart(2, '0');
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
