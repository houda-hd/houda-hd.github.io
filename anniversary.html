<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>侯大纪念日 | HOUDA+</title>
    <style>
        /* =========================================
           1. 基础与 Apple 字体生态排版 (Typography)
           ========================================= */
        :root {
            /* Apple 官方标准后备字体链 */
            --font-display: "SF Pro Display", -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            --font-text: "SF Pro Text", -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            
            /* Apple 色彩规范 */
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --bg-base: #f5f5f7;
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.6);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased; /* 字体平滑，增加高级感 */
            -moz-osx-font-smoothing: grayscale;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            font-family: var(--font-text);
            background-color: var(--bg-base);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* =========================================
           2. 极光灵动光斑 (Liquid Aurora Blobs)
           ========================================= */
        .blobs-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px); /* 极高的模糊度制造柔和的光影 */
            opacity: 0.8;
            animation: liquid-drift 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 冰蓝色 */
        .blob-1 {
            width: 45vw;
            height: 45vw;
            background: #d4e8fc;
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        /* 柔粉色 */
        .blob-2 {
            width: 40vw;
            height: 40vw;
            background: #fbe0eb;
            bottom: -15%;
            right: -5%;
            animation-delay: -5s;
        }

        /* 丁香紫 / 银白色 */
        .blob-3 {
            width: 35vw;
            height: 35vw;
            background: #e8e2fb;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes liquid-drift {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); border-radius: 40% 60% 60% 40% / 50% 50% 50% 50%; }
            50% { transform: translate(5vw, -5vh) scale(1.05) rotate(180deg); border-radius: 60% 40% 40% 60% / 40% 60% 60% 40%; }
            100% { transform: translate(-5vw, 5vh) scale(0.95) rotate(360deg); border-radius: 50% 50% 30% 70% / 60% 40% 40% 60%; }
        }

        /* =========================================
           3. 液态玻璃面板 (Liquid Glassmorphism)
           ========================================= */
        .glass-panel {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--glass-bg);
            /* 高级毛玻璃的核心参数 */
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 64px 80px;
            box-shadow: 
                0 24px 48px -12px rgba(0, 0, 0, 0.08), 
                inset 0 1px 0 rgba(255, 255, 255, 0.8); /* 顶部高光内阴影 */
            animation: liquid-breathe 10s infinite alternate ease-in-out;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
        }

        .glass-panel:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 
                0 32px 64px -16px rgba(0, 0, 0, 0.12), 
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        /* 赋予卡片极其微弱的液态形变 */
        @keyframes liquid-breathe {
            0% { border-radius: 40px; }
            50% { border-radius: 44px 36px 42px 38px; }
            100% { border-radius: 36px 44px 38px 42px; }
        }

        /* =========================================
           4. 文本与倒计时排版 (Content Layout)
           ========================================= */
        .subtitle {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 48px 0;
            letter-spacing: -0.02em;
        }

        .countdown {
            display: flex;
            gap: 32px;
            margin-bottom: 56px;
        }

        .time-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 88px;
        }

        .time-unit span {
            font-family: var(--font-display);
            font-size: 4rem;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1;
            /* 保证数字等宽，切换时不抖动 */
            font-variant-numeric: tabular-nums; 
            letter-spacing: -0.04em;
        }

        .time-unit p {
            margin: 12px 0 0 0;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* 分隔符 */
        .divider {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 300;
            color: rgba(29, 29, 31, 0.2);
            line-height: 1.1;
            margin-top: -4px;
        }

        /* =========================================
           5. 苹果风跳转按钮 (Apple CTA Button)
           ========================================= */
        .btn-houda {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background-color: var(--text-primary);
            color: #ffffff;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            border-radius: 980px; /* 经典的 Apple 胶囊按钮 */
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-houda:hover {
            background-color: #333336;
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .btn-houda:active {
            transform: scale(0.97);
        }

        .btn-houda svg {
            width: 14px;
            height: 14px;
            transition: transform 0.3s ease;
        }

        .btn-houda:hover svg {
            transform: translateX(3px);
        }

        /* =========================================
           6. 移动端适配 (Responsive)
           ========================================= */
        @media (max-width: 768px) {
            .glass-panel {
                padding: 48px 32px;
                width: 90%;
            }
            .countdown {
                gap: 16px;
                margin-bottom: 40px;
            }
            .time-unit {
                width: 64px;
            }
            .time-unit span {
                font-size: 2.8rem;
            }
            h1 {
                font-size: 2rem;
                margin-bottom: 32px;
            }
            .divider {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="blobs-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="glass-panel">
        <div class="subtitle">Anniversary</div>
        <h1>侯大纪念日</h1>
        
        <div class="countdown">
            <div class="time-unit">
                <span id="days">00</span>
                <p>天</p>
            </div>
            <div class="divider">:</div>
            <div class="time-unit">
                <span id="hours">00</span>
                <p>时</p>
            </div>
            <div class="divider">:</div>
            <div class="time-unit">
                <span id="minutes">00</span>
                <p>分</p>
            </div>
            <div class="divider">:</div>
            <div class="time-unit">
                <span id="seconds">00</span>
                <p>秒</p>
            </div>
        </div>

        <a href="index.html" class="btn-houda">
            HOUDA+ 官网
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </a>
    </div>

    <script>
        function updateCountdown() {
            const now = new Date();
            const currentYear = now.getFullYear();
            
            // 目标日期：每年 4月22日 00:00:00 (月份基于0的索引，4月即是3)
            let targetDate = new Date(currentYear, 3, 22, 0, 0, 0);

            // 如果当前时间已经过了今年的4月22日，自动顺延到明年
            if (now > targetDate) {
                targetDate = new Date(currentYear + 1, 3, 22, 0, 0, 0);
            }

            const diff = targetDate - now;

            // 数学计算时间差
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / 1000 / 60) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            // 更新 DOM 并使用 padStart 确保始终为两位数
            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        // 初始化
        updateCountdown();
        
        // 使用 setInterval 保证每秒精确跳动
        setInterval(updateCountdown, 1000);
    </script>

</body>
</html>
