<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>侯大纪念日倒计时</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
  :root {
    --glass-bg: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.25);
    --glass-shadow: rgba(0,0,0,0.3);
    --glow: rgba(255,220,170,0.4);
    --text-main: rgba(255,248,235,0.95);
    --text-dim: rgba(255,235,200,0.6);
    --accent: #f5c87a;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
min-height: 100vh;
background: radial-gradient(ellipse at 20% 30%, #1a0a2e 0%, #0d1a2e 40%, #0a0f1a 100%);
overflow: hidden;
font-family: ‘ZCOOL XiaoWei’, serif;
display: flex;
align-items: center;
justify-content: center;
position: relative;
}

/* 背景星粒 */
.stars {
position: fixed; inset: 0; pointer-events: none;
background-image:
radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
radial-gradient(1px 1px at 40% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
radial-gradient(1.5px 1.5px at 70% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
radial-gradient(1px 1px at 85% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
radial-gradient(1px 1px at 55% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
radial-gradient(2px 2px at 30% 90%, rgba(255,255,255,0.2) 0%, transparent 100%),
radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
radial-gradient(1.5px 1.5px at 10% 55%, rgba(255,220,150,0.4) 0%, transparent 100%),
radial-gradient(1px 1px at 60% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
radial-gradient(2px 2px at 25% 75%, rgba(255,200,150,0.3) 0%, transparent 100%);
}

/* 光晕球 */
.orb {
position: fixed;
border-radius: 50%;
filter: blur(80px);
opacity: 0.35;
pointer-events: none;
animation: drift 12s ease-in-out infinite alternate;
}
.orb1 {
width: 500px; height: 500px;
background: radial-gradient(circle, #6b3fa0 0%, transparent 70%);
top: -150px; left: -100px;
animation-delay: 0s;
}
.orb2 {
width: 400px; height: 400px;
background: radial-gradient(circle, #1a5fa0 0%, transparent 70%);
bottom: -100px; right: -80px;
animation-delay: -5s;
}
.orb3 {
width: 300px; height: 300px;
background: radial-gradient(circle, #a05030 0%, transparent 70%);
top: 40%; left: 50%;
animation-delay: -8s;
}

@keyframes drift {
0% { transform: translate(0,0) scale(1); }
100% { transform: translate(30px, 20px) scale(1.1); }
}

/* 主容器 液态玻璃 */
.container {
position: relative;
z-index: 10;
text-align: center;
padding: 56px 64px 48px;
border-radius: 32px;
background: rgba(255,255,255,0.07);
border: 1px solid rgba(255,255,255,0.18);
box-shadow:
0 8px 48px rgba(0,0,0,0.45),
0 2px 0 rgba(255,255,255,0.12) inset,
0 -2px 0 rgba(0,0,0,0.2) inset,
0 0 80px rgba(180,140,255,0.1);
backdrop-filter: blur(28px) saturate(180%) brightness(1.1);
-webkit-backdrop-filter: blur(28px) saturate(180%) brightness(1.1);
max-width: 680px;
width: 90vw;
animation: fadeIn 1.2s ease both;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(30px) scale(0.97); }
to { opacity: 1; transform: translateY(0) scale(1); }
}

/* 顶部光泽条 */
.container::before {
content: ‘’;
position: absolute;
top: 0; left: 15%; right: 15%; height: 1px;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
border-radius: 50%;
}

/* 标题 */
.title-cn {
font-size: clamp(1.8rem, 5vw, 2.8rem);
color: var(–text-main);
letter-spacing: 0.25em;
text-shadow: 0 0 30px rgba(255,220,150,0.4), 0 2px 4px rgba(0,0,0,0.5);
margin-bottom: 4px;
font-weight: 400;
}
.title-date {
font-family: ‘Playfair Display’, serif;
font-style: italic;
font-size: clamp(0.9rem, 2vw, 1.1rem);
color: var(–accent);
letter-spacing: 0.1em;
opacity: 0.85;
margin-bottom: 44px;
}

/* 倒计时卡片行 */
.countdown-row {
display: flex;
gap: 16px;
justify-content: center;
flex-wrap: wrap;
margin-bottom: 32px;
}

/* 单个时间卡片 液态玻璃 */
.card {
position: relative;
width: 120px;
padding: 22px 10px 16px;
border-radius: 20px;
background: rgba(255,255,255,0.06);
border: 1px solid rgba(255,255,255,0.15);
box-shadow:
0 4px 24px rgba(0,0,0,0.3),
0 1px 0 rgba(255,255,255,0.1) inset;
backdrop-filter: blur(16px) saturate(150%);
-webkit-backdrop-filter: blur(16px) saturate(150%);
overflow: hidden;
transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.card:hover {
transform: translateY(-4px) scale(1.03);
box-shadow:
0 12px 40px rgba(0,0,0,0.4),
0 1px 0 rgba(255,255,255,0.15) inset,
0 0 30px rgba(180,140,255,0.15);
}
.card::after {
content: ‘’;
position: absolute;
top: 0; left: 10%; right: 10%; height: 1px;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
}

.card-num {
font-family: ‘Playfair Display’, serif;
font-size: clamp(2.4rem, 6vw, 3.2rem);
font-weight: 700;
color: #fff;
line-height: 1;
text-shadow: 0 0 20px rgba(255,220,150,0.5), 0 2px 8px rgba(0,0,0,0.6);
letter-spacing: -0.02em;
transition: all 0.3s ease;
display: block;
}
.card-label {
font-size: 0.75rem;
color: var(–text-dim);
letter-spacing: 0.2em;
margin-top: 8px;
text-transform: uppercase;
}

/* 分隔符 */
.sep {
font-family: ‘Playfair Display’, serif;
font-size: 2rem;
color: rgba(255,255,255,0.25);
align-self: center;
margin-bottom: 24px;
line-height: 1;
user-select: none;
}

/* 底部文字 */
.footer-text {
font-size: clamp(0.85rem, 2vw, 0.95rem);
color: var(–text-dim);
letter-spacing: 0.15em;
line-height: 2;
}
.footer-text .highlight {
color: var(–accent);
font-size: 1.15em;
}

/* 已到来 */
.arrived {
font-size: clamp(1.6rem, 4vw, 2.4rem);
color: var(–accent);
letter-spacing: 0.3em;
text-shadow: 0 0 40px rgba(255,220,100,0.6);
animation: pulse 2s ease-in-out infinite;
margin: 20px 0;
}
@keyframes pulse {
0%,100% { opacity: 1; }
50% { opacity: 0.6; }
}

/* 数字跳动动画 */
@keyframes numFlip {
0% { transform: translateY(-12px); opacity: 0; }
100% { transform: translateY(0); opacity: 1; }
}
.flip { animation: numFlip 0.35s cubic-bezier(.22,1,.36,1) both; }

/* 响应式 */
@media (max-width: 500px) {
.container { padding: 40px 20px 36px; }
.card { width: 72px; padding: 16px 6px 12px; }
.sep { font-size: 1.4rem; }
}
</style>

</head>
<body>

<div class="stars"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="container">
  <div class="title-cn">侯 大 纪 念 日</div>
  <div class="title-date" id="target-date-label">— April 22 —</div>

  <div id="countdown-wrap">
    <div class="countdown-row" id="countdown-row">
      <!-- 动态生成 -->
    </div>
    <div class="footer-text" id="footer-text">
      距离 <span class="highlight" id="year-label"></span> 年侯大纪念日
    </div>
  </div>

  <div class="arrived" id="arrived-msg" style="display:none;">
    🌸 今天就是侯大纪念日 🌸
  </div>
</div>

<script>
const TARGET_MONTH = 4; // April
const TARGET_DAY   = 22;

function getTargetDate() {
  const now  = new Date();
  const year = now.getFullYear();
  const thisYear = new Date(year, TARGET_MONTH - 1, TARGET_DAY, 0, 0, 0);

  // 如果今年的日期还没过（或就是今天），用今年；否则用明年
  if (thisYear >= now) {
    return thisYear;
  }
  return new Date(year + 1, TARGET_MONTH - 1, TARGET_DAY, 0, 0, 0);
}

function isToday(d) {
  const now = new Date();
  return d.getFullYear() === now.getFullYear() &&
         d.getMonth()    === now.getMonth()    &&
         d.getDate()     === now.getDate();
}

// 卡片元素缓存
let cards = {};

function buildCards() {
  const row = document.getElementById('countdown-row');
  row.innerHTML = '';
  const units = [
    { key: 'days',    label: '天' },
    { key: 'hours',   label: '时' },
    { key: 'minutes', label: '分' },
    { key: 'seconds', label: '秒' },
  ];

  units.forEach((u, i) => {
    if (i > 0) {
      const sep = document.createElement('div');
      sep.className = 'sep';
      sep.textContent = ':';
      row.appendChild(sep);
    }
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<span class="card-num" id="num-${u.key}">--</span>
                      <div class="card-label">${u.label}</div>`;
    row.appendChild(card);
    cards[u.key] = document.getElementById('num-' + u.key);
  });
}

function pad(n) { return String(n).padStart(2, '0'); }

let prevVals = {};

function tick() {
  const target = getTargetDate();
  const now    = new Date();

  if (isToday(target)) {
    document.getElementById('countdown-wrap').style.display = 'none';
    document.getElementById('arrived-msg').style.display = 'block';
    return;
  }

  const diff = target - now;
  if (diff <= 0) {
    // 触发重算（跨年零点）
    tick();
    return;
  }

  const days    = Math.floor(diff / 86400000);
  const hours   = Math.floor((diff % 86400000) / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  const seconds = Math.floor((diff % 60000) / 1000);

  const vals = { days, hours, minutes, seconds };

  Object.entries(vals).forEach(([key, val]) => {
    const el = cards[key];
    if (!el) return;
    const str = key === 'days' ? String(val) : pad(val);
    if (str !== prevVals[key]) {
      el.textContent = str;
      el.classList.remove('flip');
      void el.offsetWidth; // reflow
      el.classList.add('flip');
      prevVals[key] = str;
    }
  });

  document.getElementById('year-label').textContent = target.getFullYear();
}

buildCards();
tick();
setInterval(tick, 1000);
</script>

</body>
</html>
