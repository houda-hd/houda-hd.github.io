<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>侯大纪念日倒计时</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --primary-text: #2c3e50;
            --accent-color: #6366f1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 使用优美的渐变作为背景基底 */
            background: linear-gradient(135deg, #e0e7ff 0%, #f0fdf4 100%);
            font-family: "SF Pro Display", "SF Pro Icons", "PingFang SC", "Helvetica Neue", "Helvetica", "Arial", sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 灵动背景光斑 */
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(180deg, rgba(99, 102, 241, 0.2) 0%, rgba(168, 85, 247, 0.2) 100%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: move 20s infinite alternate;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: rgba(52, 211, 153, 0.2);
            left: 10%;
            top: 10%;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) rotate(0deg); }
            to { transform: translate(20%, 20%) rotate(360deg); }
        }

        /* 液态玻璃卡片 */
        .glass-card {
            position: relative;
            z-index: 1;
            padding: 3rem;
            width: 90%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        h1 {
            font-weight: 600;
            color: var(--primary-text);
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
            font-size: 1.5rem;
        }

        .countdown-container {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .time-box {
            flex: 1;
            padding: 1rem 0.5rem;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .number {
            display: block;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-color);
            font-feature-settings: "tnum"; /* 保持等宽数字，防止抖动 */
        }

        .label {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .target-date {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="blob"></div>
    <div class="blob blob-2"></div>

    <div class="glass-card">
        <h1>距离 侯大纪念日 还有</h1>
        
        <div class="countdown-container">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">天</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">时</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">分</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">秒</span>
            </div>
        </div>

        <div class="target-date">目标日期：每年 4 月 22 日</div>
    </div>

    <script>
        function updateCountdown() {
            const now = new Date();
            let currentYear = now.getFullYear();
            
            // 设定今年的目标日期
            let targetDate = new Date(currentYear, 3, 22); // 月份从0开始，3代表4月

            // 如果今年的日期已经过了，就计算明年的
            if (now > targetDate) {
                targetDate = new Date(currentYear + 1, 3, 22);
            }

            const diff = targetDate - now;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            const s = Math.floor((diff / 1000) % 60);

            // 填充数字，保证两位数显示
            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');
        }

        // 初始执行并设置定时器
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
