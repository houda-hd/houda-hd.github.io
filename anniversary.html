<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>侯大纪念日倒计时</title>
    <style>
        /* 基础与字体设置：SF Pro + PingFang */
        :root {
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: var(--font-main);
            background-color: #f7f9fc; /* 极浅的亮色背景 */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* 灵动光斑动画与设置 */
        .blobs-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.7;
            animation: liquid-drift 15s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            top: 10%;
            left: 20%;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            bottom: 20%;
            right: 15%;
            animation-delay: -3s;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            top: 40%;
            left: 60%;
            animation-delay: -7s;
        }

        @keyframes liquid-drift {
            0% { transform: translate(0, 0) scale(1); border-radius: 40% 60% 60% 40% / 50% 50% 50% 50%; }
            33% { transform: translate(30px, -50px) scale(1.1); border-radius: 60% 40% 40% 60% / 40% 60% 60% 40%; }
            66% { transform: translate(-40px, 40px) scale(0.9); border-radius: 50% 50% 30% 70% / 60% 40% 40% 60%; }
            100% { transform: translate(0, 0) scale(1); border-radius: 40% 60% 60% 40% / 50% 50% 50% 50%; }
        }

        /* 液态玻璃卡片 */
        .glass-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px) saturate(1.5);
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 50px 70px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            text-align: center;
            /* 赋予卡片液态呼吸感 */
            animation: card-breathe 8s infinite alternate ease-in-out;
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
        }

        @keyframes card-breathe {
            0% { border-radius: 30px; }
            100% { border-radius: 35px 25px 35px 25px; }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 40px;
            margin-top: 0;
            background: linear-gradient(120deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(79, 172, 254, 0.1);
        }

        /* 倒计时数字排版 */
        .countdown {
            display: flex;
            gap: 25px;
            justify-content: center;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80px;
        }

        .time-box span {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.1;
            color: #2c3e50;
            text-shadow: 0 2px 5px rgba(255, 255, 255, 0.8);
            font-variant-numeric: tabular-nums; /* 让数字等宽，避免跳动 */
        }

        .time-box p {
            margin: 10px 0 0 0;
            font-size: 0.9rem;
            font-weight: 500;
            color: #667;
            letter-spacing: 1px;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            .glass-card {
                padding: 40px 30px;
            }
            .countdown {
                gap: 15px;
            }
            .time-box span {
                font-size: 2.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="blobs-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="glass-card">
        <h1>侯大纪念日</h1>
        <div class="countdown">
            <div class="time-box">
                <span id="days">00</span>
                <p>天</p>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <p>时</p>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <p>分</p>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <p>秒</p>
            </div>
        </div>
    </div>

    <script>
        function updateCountdown() {
            const now = new Date();
            const currentYear = now.getFullYear();
            
            // 目标日期设为当前年份的4月22日 (月份在JS中是0-11，所以3代表4月)
            let targetDate = new Date(currentYear, 3, 22, 0, 0, 0);

            // 如果今天的日期已经过了今年的4月22日，则目标日期自动设为明年的4月22日
            if (now > targetDate) {
                targetDate = new Date(currentYear + 1, 3, 22, 0, 0, 0);
            }

            const diff = targetDate - now;

            // 时间计算
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / 1000 / 60) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            // 格式化输出 (不足两位的补0)
            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        // 初始化并每秒刷新
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>

</body>
</html>
