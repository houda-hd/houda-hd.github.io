<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>HOUDA+ - 官方网站 (YZRT 重构版)</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    
    <style>
        /* 参考 yzrt 风格的全局重构 */
        :root {
            --yzrt-bg: #ffffff;
            --yzrt-text: #1a1a1a;
            --yzrt-accent: #000000;
            --yzrt-card-bg: #f9f9f9;
            --yzrt-transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            margin: 0;
            font-family: -apple-system, "Noto Sans SC", sans-serif;
            background: var(--yzrt-bg);
            color: var(--yzrt-text);
            line-height: 1.6;
        }

        /* 导航栏重构：由液态玻璃改为 yzrt 极简实色 */
        .yzrt-nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid #eee;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-around;
        }

        .yzrt-nav a {
            text-decoration: none;
            color: var(--yzrt-text);
            font-weight: 500;
            transition: var(--yzrt-transition);
        }

        .yzrt-nav a:hover {
            color: #666;
        }

        /* 核心内容区重构 */
        .yzrt-hero {
            padding: 140px 20px 80px;
            text-align: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        .yzrt-hero h1 {
            font-size: 3.5rem;
            letter-spacing: -2px;
            margin-bottom: 20px;
            font-weight: 900;
        }

        /* yzrt 标志性的功能卡片样式 */
        .yzrt-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .yzrt-card {
            background: var(--yzrt-card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid transparent;
            transition: var(--yzrt-transition);
            cursor: pointer;
        }

        .yzrt-card:hover {
            background: #fff;
            border-color: #000;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
        }

        /* 底部 Dock 替代方案 */
        .yzrt-footer {
            background: #000;
            color: #fff;
            padding: 60px 20px;
            text-align: center;
        }

        /* 适配移动端 */
        @media (max-width: 768px) {
            .yzrt-hero h1 { font-size: 2.2rem; }
            .yzrt-card-grid { padding: 20px; }
        }
    </style>
</head>
<body>

    <header class="yzrt-nav">
        <div style="font-weight: 900; font-size: 1.5rem;">HOUDA+</div>
        <nav>
            <a href="#about">关于</a> &nbsp;&nbsp;&nbsp;
            <a href="#tools">百宝箱</a> &nbsp;&nbsp;&nbsp;
            <a href="#contact">关注</a>
        </nav>
    </header>

    <section class="yzrt-hero">
        <h1>欢迎来到 HOUDA+</h1>
        <p style="font-size: 1.2rem; color: #666;">长沙霉粉联盟六群分支 · 侯明昊碗慧通讯录互吃大学官方站点</p>
    </section>

    <section class="yzrt-card-grid" id="tools">
        <div class="yzrt-card">
            <i class="fa-solid fa-clock-rotate-left" style="font-size: 2rem; margin-bottom: 15px;"></i>
            <h3>纪念日倒计时</h3>
            <p>记录每一个重要时刻的精准跳动</p>
        </div>
        <div class="yzrt-card">
            <i class="fa-solid fa-clipboard-question" style="font-size: 2rem; margin-bottom: 15px;"></i>
            <h3>HDTI人格测试</h3>
            <p>探索您在 HOUDA+ 宇宙中的专属人格</p>
        </div>
        <div class="yzrt-card">
            <i class="fa-solid fa-map-location" style="font-size: 2rem; margin-bottom: 15px;"></i>
            <h3>免税州地址生成</h3>
            <p>为海淘需求提供便捷的地址解决方案</p>
        </div>
    </section>

    <footer class="yzrt-footer">
        <p>&copy; 2024 HOUDA+ Official. Powered by yzrt Style.</p>
    </footer>

</body>
</html>
